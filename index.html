<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Salon AI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1B2E4A;
    --navy-deep: #0F1E33;
    --accent: #003399;
    --gold: #FFC83D;
  }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    color: #fff;
    overflow: hidden;
  }

  /* ── STAGE (cloud background) ─────────────────────────── */
  .stage {
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
    background: url('Mai-stepbystepguide/clouds/sky-hero.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }
  .stage::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(120% 80% at 50% 32%, rgba(15,30,51,0) 40%, rgba(15,30,51,0.18) 100%),
      linear-gradient(180deg, rgba(15,30,51,0.10) 0%, rgba(15,30,51,0) 24%, rgba(15,30,51,0) 64%, rgba(15,30,51,0.28) 100%);
    pointer-events: none;
    z-index: 1;
  }
  .stage > * { position: relative; z-index: 2; }

  /* ── GLASS RECIPE (milky frosted, adopts the background) ─ */
  .glass {
    background: rgba(116,112,104,0.26);
    backdrop-filter: blur(42px) saturate(75%) brightness(1.07);
    -webkit-backdrop-filter: blur(42px) saturate(75%) brightness(1.07);
    border: 1px solid rgba(255,250,242,0.22);
    box-shadow: 0 24px 60px rgba(15,30,51,0.30), inset 0 1px 0 rgba(255,250,242,0.22);
  }
  @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
    .glass { background: rgba(54,50,44,0.82); }
  }

  /* ── INVITATION CARD ──────────────────────────────────── */
  .invite {
    width: min(92vw, 540px);
    border-radius: 32px;
    padding: clamp(34px, 6vw, 56px) clamp(26px, 5vw, 52px);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .invite__eyebrow {
    display: inline-flex; align-items: center; gap: 9px;
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 2.8px; color: rgba(255,255,255,0.9);
    text-wrap: balance;
  }
  .invite__eyebrow::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold);
  }

  .invite__tagline {
    margin-top: 20px;
    font-family: 'Playfair Display', serif;
    font-style: italic; font-weight: 400;
    font-size: clamp(1.5rem, 4.6vw, 2.05rem);
    line-height: 1.22; color: #fff;
    text-wrap: balance;
  }

  .invite__body {
    margin-top: 20px;
    max-width: 40ch;
    font-size: clamp(14.5px, 1.7vw, 15.5px);
    font-weight: 400; line-height: 1.65;
    color: rgba(255,255,255,0.82);
    text-wrap: balance;
  }

  .invite__rule {
    width: 46px; height: 1px; margin: 30px 0 24px;
    background: rgba(255,255,255,0.32);
  }

  .invite__contact {
    font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.9);
    letter-spacing: 0.2px;
  }
  .invite__contact a {
    color: var(--gold); text-decoration: none;
    border-bottom: 1px solid rgba(255,200,61,0.4);
    padding-bottom: 1px; transition: border-color 0.2s ease;
  }
  .invite__contact a:hover { border-bottom-color: var(--gold); }

  @media (prefers-reduced-motion: reduce) {
    .invite__contact a { transition: none; }
  }
</style>
</head>
<body>

<main class="stage">
  <section class="invite glass" aria-label="Salon AI — invitation">
    <span class="invite__eyebrow">Salon AI · Executive AI Labs</span>

    <h1 class="invite__tagline">Exclusive gatherings for key decision-makers shaping the future with AI.</h1>

    <p class="invite__body">An exclusive forum for founders and executives exploring how artificial intelligence is transforming their businesses, products, and competitive advantages.</p>

    <div class="invite__rule" aria-hidden="true"></div>

    <p class="invite__contact">Write us @ <a href="mailto:luckysprouts@duck.com">luckysprouts@duck.com</a></p>
  </section>
</main>

</body>
</html>
