<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Salon AI Dinner · 28. Mai 2026 · München (Flyer)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B2E4A;
    --navy-deep: #0F1E33;
    --accent: #003399;
    --sky-deep: #6B90AD;
    --muted: #6B7280;
    --paper: #FAFAF8;
    --rule: rgba(27,46,74,0.16);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #E5E7EB; font-family: 'DM Sans', system-ui, sans-serif; color: var(--navy); }

  /* A5 portrait — 148mm × 210mm */
  .flyer {
    width: 148mm;
    height: 210mm;
    margin: 24px auto;
    background: var(--paper);
    color: var(--navy);
    box-shadow: 0 10px 36px rgba(15,30,51,0.18);
    overflow: hidden;
    padding: 24mm 18mm 18mm;
    display: flex;
    flex-direction: column;
    text-align: center;
  }

  /* Brand */
  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: 0.4px;
    margin-bottom: 24mm;
  }
  .brand .eu {
    color: var(--sky-deep);
    font-weight: 400;
    font-style: italic;
  }

  /* The 3 spiky lines carry the whole flyer */
  .spiky p {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 19pt;
    line-height: 1.32;
    color: var(--navy-deep);
    letter-spacing: -0.008em;
    margin-bottom: 6mm;
    text-wrap: balance;
  }
  .spiky p:last-child {
    color: var(--accent);
    margin-bottom: 0;
  }

  /* Footer — date, place, QR, price */
  .footer {
    margin-top: auto;
    padding-top: 8mm;
    border-top: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4mm;
  }
  .footer .when {
    font-family: 'Playfair Display', serif;
    font-size: 15pt;
    font-weight: 700;
    color: var(--navy-deep);
    letter-spacing: -0.01em;
  }
  .footer .where {
    font-size: 10pt;
    color: var(--muted);
    letter-spacing: 0.3px;
  }
  .qr {
    width: 26mm;
    height: 26mm;
    border: 1px solid var(--rule);
    border-radius: 1mm;
    background: #fff;
    padding: 1mm;
    margin-top: 2mm;
  }
  .qr img { display: block; width: 100%; height: 100%; }
  .footer .price {
    font-size: 9pt;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-top: 1mm;
  }

  /* Print */
  @page { size: A5 portrait; margin: 0; }
  @media print {
    html, body { background: #fff; }
    .flyer { margin: 0; box-shadow: none; width: 100%; height: 100vh; }
    .print-controls { display: none !important; }
  }

  .print-controls {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--navy);
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 999px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(15,30,51,0.25);
    letter-spacing: 0.2px;
  }
  .print-controls:hover { background: var(--accent); }
</style>
</head>
<body>

<div class="flyer">
  <p class="brand">Salon <span class="eu">AI</span></p>

  <div class="spiky">
    <p>Ein Tischgespräch mit KI.</p>
    <p>Du baust deinen eigenen Assistenten.</p>
    <p>KI muss nicht steril sein.</p>
  </div>

  <div class="footer">
    <span class="when">28. Mai 2026 · 18:00</span>
    <span class="where">Luitpoldblock, München · Dinner inklusive</span>
    <div class="qr">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https%3A%2F%2Fsalon-ai.eu%2F%23events&color=1B2E4A&margin=4" alt="QR → salon-ai.eu/#events" />
    </div>
    <span class="price">78 € · salon-ai.eu</span>
  </div>
</div>

<button class="print-controls" onclick="window.print()">Drucken / Print →</button>

</body>
</html>
