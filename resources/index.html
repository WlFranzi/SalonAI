    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Caveat:wght@400;600;700&display=swap"
      rel="stylesheet"

  <style>
    /* Floating language button — bottom-right, doesn't affect React layout */
    #ki-lang-float { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
    #ki-lang-float-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; padding: 7px 13px;
      border-radius: 999px;
      background: rgba(27,46,74,0.92); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.88);
      cursor: pointer; font-family: system-ui, sans-serif;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      transition: background 0.15s; white-space: nowrap;
    }
    #ki-lang-float-btn:hover { background: rgba(27,46,74,1); color: #fff; }
    #ki-lang-menu {
      display: none; position: absolute;
      bottom: calc(100% + 8px); right: 0;
      background: #fff; border: 1px solid rgba(0,0,0,0.08);
      border-radius: 14px; padding: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      width: 336px; max-width: calc(100vw - 28px);
    }
    #ki-lang-menu.open { display: block; }
    .ki-lang-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 2px; }
    .ki-lang-opt {
      display: flex; align-items: center; gap: 5px;
      width: 100%; text-align: left; padding: 6px 8px;
      border: none; background: transparent;
      font-size: 12px; color: #1B2E4A; cursor: pointer;
      border-radius: 8px; font-family: system-ui, sans-serif;
      transition: background 0.1s; white-space: nowrap;
    }
    .ki-lang-opt:hover { background: #E8F2FA; }
    .ki-lang-opt.active { background: rgba(0,51,153,0.07); font-weight: 700; color: #003399; }
  </style>
    <script type="module" crossorigin src="/resources/assets/index-h299pZjW.js"></script>
    <link rel="stylesheet" crossorigin href="/resources/assets/index-oXGtm6f1.css">
  </head>
  <body>
    <!-- Floating language button (bottom-right, doesn't affect React layout) -->
    <div id="ki-lang-float">
      <button id="ki-lang-float-btn" onclick="document.getElementById('ki-lang-menu').classList.toggle('open');event.stopPropagation();">
        🌍 <span id="ki-lang-lbl">DE</span> ▾
      </button>
      <div id="ki-lang-menu">
        <div class="ki-lang-grid">
          <button class="ki-lang-opt active" data-lang="de" onclick="setLangKI('de')">🇩🇪 Deutsch</button>
          <button class="ki-lang-opt" data-lang="en" onclick="setLangKI('en')">🇬🇧 English</button>
          <button class="ki-lang-opt" data-lang="fr" onclick="setLangKI('fr')">🇫🇷 Français</button>
          <button class="ki-lang-opt" data-lang="es" onclick="setLangKI('es')">🇪🇸 Español</button>
          <button class="ki-lang-opt" data-lang="it" onclick="setLangKI('it')">🇮🇹 Italiano</button>
          <button class="ki-lang-opt" data-lang="pt" onclick="setLangKI('pt')">🇵🇹 Português</button>
          <button class="ki-lang-opt" data-lang="nl" onclick="setLangKI('nl')">🇳🇱 Nederlands</button>
          <button class="ki-lang-opt" data-lang="pl" onclick="setLangKI('pl')">🇵🇱 Polski</button>
          <button class="ki-lang-opt" data-lang="ro" onclick="setLangKI('ro')">🇷🇴 Română</button>
          <button class="ki-lang-opt" data-lang="sv" onclick="setLangKI('sv')">🇸🇪 Svenska</button>
          <button class="ki-lang-opt" data-lang="cs" onclick="setLangKI('cs')">🇨🇿 Čeština</button>
          <button class="ki-lang-opt" data-lang="hu" onclick="setLangKI('hu')">🇭🇺 Magyar</button>
          <button class="ki-lang-opt" data-lang="sk" onclick="setLangKI('sk')">🇸🇰 Slovenčina</button>
          <button class="ki-lang-opt" data-lang="bg" onclick="setLangKI('bg')">🇧🇬 Български</button>
          <button class="ki-lang-opt" data-lang="da" onclick="setLangKI('da')">🇩🇰 Dansk</button>
          <button class="ki-lang-opt" data-lang="fi" onclick="setLangKI('fi')">🇫🇮 Suomi</button>
          <button class="ki-lang-opt" data-lang="hr" onclick="setLangKI('hr')">🇭🇷 Hrvatski</button>
          <button class="ki-lang-opt" data-lang="el" onclick="setLangKI('el')">🇬🇷 Ελληνικά</button>
          <button class="ki-lang-opt" data-lang="lt" onclick="setLangKI('lt')">🇱🇹 Lietuvių</button>
          <button class="ki-lang-opt" data-lang="lv" onclick="setLangKI('lv')">🇱🇻 Latviešu</button>
          <button class="ki-lang-opt" data-lang="et" onclick="setLangKI('et')">🇪🇪 Eesti</button>
          <button class="ki-lang-opt" data-lang="sl" onclick="setLangKI('sl')">🇸🇮 Slovenščina</button>
          <button class="ki-lang-opt" data-lang="mt" onclick="setLangKI('mt')">🇲🇹 Malti</button>
          <button class="ki-lang-opt" data-lang="ga" onclick="setLangKI('ga')">🇮🇪 Gaeilge</button>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      // Language stored in localStorage — syncs with main Salon AI page
      function setLangKI(code) {
        document.getElementById('ki-lang-menu').classList.remove('open');
        try { localStorage.setItem('salonai_lang', code); } catch(e) {}
        window.location.reload();
      }
      // Restore active state from localStorage on load
      (function() {
        var activeCode = 'de';
        try { activeCode = localStorage.getItem('salonai_lang') || 'de'; } catch(e) {}
        document.querySelectorAll('.ki-lang-opt').forEach(function(o){o.classList.remove('active');});
        var activeOpt = document.querySelector('.ki-lang-opt[data-lang="' + activeCode + '"]');
        if (activeOpt) activeOpt.classList.add('active');
        var lbl = document.getElementById('ki-lang-lbl');
        if (lbl) lbl.textContent = activeCode.toUpperCase();
      })();
      // Close on outside click
      document.addEventListener('click', function() {
        var m = document.getElementById('ki-lang-menu');
        if (m) m.classList.remove('open');
      });
    </script>
  </body>
</html>
